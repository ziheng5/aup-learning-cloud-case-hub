repo_path: "."
artifacts_dir: ".jupypilot"
ollama:
  endpoint: "http://open-webui-ollama.open-webui:11434/api/chat"
  model: "qwen3-coder-30b"
  temperature: 0.2
  top_p: 0.9
  timeout_s: 300
  max_retries: 3
  backoff_base_s: 1.0
  num_ctx: 32768
tool_loop:
  max_iters: 15
  correction_retries: 2
tools:
  allow_git_apply_check: true
  allow_write_files: false
limits:
  open_file_max_lines: 400
  search_max_results: 30
  max_stdout_bytes: 65536
  max_stderr_bytes: 65536
  subprocess_timeout_s: 180
  rg_timeout_s: 30
context:
  max_ctx_tokens: 32768
  completion_budget_tokens: 3072
  retrieved_topk: 8
  chunk_lines: 300
  history_max_turns: 12
  memory_summary_trigger_tokens: 24000
  text_chunk_target_tokens: 1600
  text_recursive_summary_max_rounds: 4
rag:
  ignore_dirs: [".git", ".venv", "venv", "__pycache__", "node_modules", ".jupypilot"]
  ignore_globs: ["*.png", "*.jpg", "*.jpeg", "*.gif", "*.pdf", "*.zip", "*.tar", "*.gz", "*.bin"]
  max_file_bytes: 800000

