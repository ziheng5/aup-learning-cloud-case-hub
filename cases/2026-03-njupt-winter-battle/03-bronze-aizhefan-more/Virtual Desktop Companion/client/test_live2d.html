<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live2D ???????</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            margin: auto;
        }

        .model-panel {
            flex: 1;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .control-panel {
            width: 400px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h2 {
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }

        .model-container {
            width: 100%;
            height: 500px;
            background: linear-gradient(180deg, #e8f4ff 0%, #fff5f5 100%);
            border-radius: 15px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        canvas {
            display: block;
        }

        .status-bar {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 10px 15px;
            margin-top: 15px;
            font-size: 14px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }

        .status-item:last-child {
            border-bottom: none;
        }

        .emotion-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .emotion-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .emotion-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .emotion-btn.happy { background: #ffd93d; color: #333; }
        .emotion-btn.sad { background: #74b9ff; color: #fff; }
        .emotion-btn.angry { background: #ff7675; color: #fff; }
        .emotion-btn.playful { background: #a29bfe; color: #fff; }
        .emotion-btn.philosophical { background: #636e72; color: #fff; }
        .emotion-btn.neutral { background: #b2bec3; color: #333; }

        .chat-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border 0.3s;
        }

        .chat-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .send-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .response-area {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            min-height: 100px;
            font-size: 14px;
            line-height: 1.6;
        }

        .params-display {
            background: #2d3436;
            color: #00ff88;
            border-radius: 10px;
            padding: 15px;
            font-family: 'Consolas', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .motion-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .motion-btn {
            padding: 10px;
            background: #00cec9;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .motion-btn:hover {
            background: #00b894;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="model-panel">
            <h2>? Live2D ???</h2>
            <div class="model-container">
                <canvas id="live2dCanvas"></canvas>
            </div>
            <div class="status-bar">
                <div class="status-item">
                    <span>?????:</span>
                    <span id="modelStatus">??????...</span>
                </div>
                <div class="status-item">
                    <span>???????:</span>
                    <span id="currentEmotion">-</span>
                </div>
                <div class="status-item">
                    <span>???????:</span>
                    <span id="currentMotion">-</span>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <h2>? ??????????</h2>
            <div class="emotion-buttons">
                <button class="emotion-btn happy" onclick="testEmotion('happy')">
                    ? ????
                </button>
                <button class="emotion-btn sad" onclick="testEmotion('sad')">
                    ? ????
                </button>
                <button class="emotion-btn angry" onclick="testEmotion('angry')">
                    ? ????
                </button>
                <button class="emotion-btn playful" onclick="testEmotion('playful')">
                    ? ???
                </button>
                <button class="emotion-btn philosophical" onclick="testEmotion('philosophical')">
                    ? ???
                </button>
                <button class="emotion-btn neutral" onclick="testEmotion('neutral')">
                    ? ????
                </button>
            </div>

            <h2>? ????????</h2>
            <div class="motion-buttons">
                <button class="motion-btn" onclick="playMotion('mtn_01')">???? 1</button>
                <button class="motion-btn" onclick="playMotion('mtn_02')">???? 2</button>
                <button class="motion-btn" onclick="playMotion('mtn_03')">???? 3</button>
                <button class="motion-btn" onclick="playMotion('mtn_04')">???? 4</button>
            </div>

            <h2>? ??AI???????</h2>
            <div class="chat-section">
                <input type="text" class="chat-input" id="chatInput" 
                       placeholder="???????????????????????Live2D????..." 
                       onkeypress="handleKeyPress(event)" />
                <button class="send-btn" id="sendBtn" onclick="sendChat()">
                    ???????
                </button>
            </div>

            <h3>? AI ???:</h3>
            <div class="response-area" id="responseArea">
                ??????...
            </div>

            <h3>? Live2D ???? (??????????):</h3>
            <div class="params-display" id="paramsDisplay">
                ????????????????...
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@pixi/live2d@0.4.0/dist/index.js"></script>
    <script src="live2dcubismcore.min.js"></script>

    <script>
        const SERVER_URL = 'https://rabbit-port-vegetable-colorado.trycloudflare.com';
        const MODEL_PATH = './mao_pro_zh/mao_pro_zh/runtime/mao_pro.model3.json';

        let live2dModel = null;
        let pixiApp = null;
        let sessionId = null;

        const emotionExpressionMap = {
            'happy': { expression: 'exp_01', motion: 'mtn_01' },
            'sad': { expression: 'exp_02', motion: 'mtn_02' },
            'angry': { expression: 'exp_03', motion: 'mtn_03' },
            'playful': { expression: 'exp_04', motion: 'special_02' },
            'philosophical': { expression: 'exp_05', motion: 'mtn_04' },
            'neutral': { expression: 'exp_06', motion: 'mtn_01' }
        };

        async function initLive2D() {
            try {
                const canvas = document.getElementById('live2dCanvas');
                
                const canvasWidth = 400;
                const canvasHeight = 500;
                
                canvas.width = canvasWidth;
                canvas.height = canvasHeight;

                pixiApp = new PIXI.Application({
                    view: canvas,
                    autoStart: true,
                    transparent: true,
                    backgroundAlpha: 0,
                    width: canvasWidth,
                    height: canvasHeight,
                    resolution: window.devicePixelRatio || 1,
                    autoDensity: true
                });

                const Live2DModel = PIXI.live2d.Live2DModel;
                await Live2DModel.registerTicker(PIXI.Ticker);
                
                console.log('???????:', MODEL_PATH);
                live2dModel = await Live2DModel.from(MODEL_PATH);
                
                pixiApp.stage.addChild(live2dModel);

                const scaleX = canvasWidth / live2dModel.width;
                const scaleY = canvasHeight / live2dModel.height;
                const scale = Math.min(scaleX, scaleY) * 0.9;
                
                live2dModel.scale.set(scale);
                const scaledWidth = live2dModel.width * scale;
                const scaledHeight = live2dModel.height * scale;
                live2dModel.x = (canvasWidth - scaledWidth) / 2;
                live2dModel.y = canvasHeight - scaledHeight;

                document.getElementById('modelStatus').textContent = '? ?????';
                console.log('Live2D ????????!');

                startIdleMotion();

            } catch (error) {
                console.error('Live2D ???????:', error);
                document.getElementById('modelStatus').textContent = '? ???????: ' + error.message;
            }
        }

        function startIdleMotion() {
            if (!live2dModel) return;
            
            setInterval(() => {
                if (live2dModel) {
                    const motions = ['mtn_01', 'mtn_02', 'mtn_03', 'mtn_04'];
                    const randomMotion = motions[Math.floor(Math.random() * motions.length)];
                    live2dModel.motion(randomMotion).catch(() => {});
                }
            }, 8000);
        }

        function testEmotion(emotion) {
            if (!live2dModel) {
                alert('??????????????!');
                return;
            }

            const config = emotionExpressionMap[emotion] || emotionExpressionMap['neutral'];
            
            live2dModel.expression(config.expression).catch((e) => {
                console.log('???????????:', e);
            });
            
            live2dModel.motion(config.motion).catch((e) => {
                console.log('???????????:', e);
            });

            document.getElementById('currentEmotion').textContent = emotion;
            document.getElementById('currentMotion').textContent = config.motion;

            console.log(`???????: ${emotion}, ????: ${config.expression}, ????: ${config.motion}`);
        }

        function playMotion(motionName) {
            if (!live2dModel) {
                alert('??????????????!');
                return;
            }

            live2dModel.motion(motionName).then(() => {
                document.getElementById('currentMotion').textContent = motionName;
                console.log('???????:', motionName);
            }).catch((e) => {
                console.log('???????????:', e);
                alert('???? ' + motionName + ' ??????');
            });
        }

        async function sendChat() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> ??????...';

            try {
                if (!sessionId) {
                    const sessionRes = await axios.post(`${SERVER_URL}/api/v1/session`);
                    sessionId = sessionRes.data.session_id;
                }

                const response = await axios.post(`${SERVER_URL}/api/v1/chat`, {
                    session_id: sessionId,
                    message: message,
                    stream: false
                }, { timeout: 60000 });

                const data = response.data;
                console.log('??????????:', data);

                document.getElementById('responseArea').textContent = data.text;

                document.getElementById('currentEmotion').textContent = data.emotion;
                document.getElementById('currentMotion').textContent = data.action || '-';

                const paramsDisplay = document.getElementById('paramsDisplay');
                paramsDisplay.innerHTML = `
emotion_vector: ${JSON.stringify(data.emotion_vector, null, 2)}

live2d_params: ${JSON.stringify(data.live2d_params, null, 2)}

emotion: ${data.emotion}
action: ${data.action || 'idle'}
                `.trim();

                if (live2dModel) {
                    const config = emotionExpressionMap[data.emotion] || emotionExpressionMap['neutral'];
                    
                    live2dModel.expression(config.expression).catch(() => {});
                    live2dModel.motion(config.motion).catch(() => {});

                    if (data.live2d_params && data.live2d_params.params) {
                        const params = data.live2d_params.params;
                        applyLive2DParams(params);
                    }
                }

            } catch (error) {
                console.error('???????:', error);
                document.getElementById('responseArea').textContent = '????????????: ' + (error.message || '???????');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '???????';
                input.value = '';
            }
        }

        function applyLive2DParams(params) {
            if (!live2dModel) return;

            try {
                if (params.eye_open !== undefined) {
                    live2dModel.internalModel.coreModel.setParameterValueById('ParamEyeLOpen', params.eye_open);
                    live2dModel.internalModel.coreModel.setParameterValueById('ParamEyeROpen', params.eye_open);
                }
                if (params.mouth_open !== undefined) {
                    live2dModel.internalModel.coreModel.setParameterValueById('ParamMouthOpenY', params.mouth_open);
                }
                if (params.eye_x !== undefined) {
                    live2dModel.internalModel.coreModel.setParameterValueById('ParamEyeBallX', params.eye_x);
                }
                if (params.eye_y !== undefined) {
                    live2dModel.internalModel.coreModel.setParameterValueById('ParamEyeBallY', params.eye_y);
                }
                if (params.body_angle_y !== undefined) {
                    live2dModel.internalModel.coreModel.setParameterValueById('ParamBodyAngleY', params.body_angle_y);
                }
            } catch (e) {
                console.log('??????????:', e);
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendChat();
            }
        }

        window.addEventListener('DOMContentLoaded', initLive2D);
    </script>
</body>
</html>
