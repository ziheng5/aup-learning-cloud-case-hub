<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Desktop Pet</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app" class="pet-container">
        <div class="pet-avatar" @click="handleAvatarClick" @mousedown="startDrag">
            <canvas ref="live2dCanvas" class="live2d-canvas"></canvas>
        </div>

        <div class="chat-overlay" v-if="showChat" @click="closeChat"></div>
        
        <div class="chat-panel" v-if="showChat" @click.stop>
            <div class="chat-header">
                <div class="mode-indicator">
                    <span class="mode-text">当前模式：</span>
                    <span :class="['mode-badge', currentMode]">
                        {{ currentMode === 'chat' ? '聊天' : 'WSL2命令' }}
                    </span>
                </div>
                <button @click="toggleMode" class="mode-toggle-btn">
                    切换模式
                </button>
            </div>
            <div class="chat-messages" ref="chatMessages">
                <div v-for="msg in messages" :key="msg.id" 
                     :class="['chat-msg', msg.role]">
                    <span>{{ msg.content }}</span>
                </div>
            </div>
            <div class="chat-input-simple">
                <input type="text" v-model="inputMsg" 
                       @keyup.enter="sendMsg" 
                       :placeholder="currentMode === 'chat' ? '输入消息...' : '输入WSL2命令...'" 
                       @click.stop />
            </div>
        </div>

        <!-- 命令执行确认对话框 -->
        <div class="modal-overlay" v-if="showCommandModal" @click="closeCommandModal"></div>
        <div class="command-modal" v-if="showCommandModal" @click.stop>
            <h3>命令执行确认</h3>
            <div class="command-content">
                <code>{{ currentCommand }}</code>
            </div>
            <div class="command-timeout">
                <label for="timeout">超时时间 (秒):</label>
                <input type="number" id="timeout" v-model.number="commandTimeout" min="10" max="3600" step="10">
            </div>
            <div class="command-actions">
                <button @click="closeCommandModal" class="btn-cancel">取消</button>
                <button @click="executeLocalWSLCommand" class="btn-execute" :disabled="isExecutingCommand">
                    {{ isExecutingCommand ? '执行中...' : '执行命令' }}
                </button>
            </div>
        </div>
    </div>

    <script>
        // 全局错误处理
        window.onerror = function(message, source, lineno, colno, error) {
            console.error('全局错误:', message, '在', source, '行', lineno);
            if (error) {
                console.error('错误对象:', error);
                console.error('错误堆栈:', error.stack);
            }
        };
        
        // 检查Vue库是否加载
        console.log('检查Vue库...');
        setTimeout(() => {
            console.log('Vue是否存在:', typeof Vue !== 'undefined');
            if (typeof Vue !== 'undefined') {
                console.log('Vue版本:', Vue.version);
            }
        }, 1000);
    </script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.3.3/dist/pixi.min.js"></script>
    <script>window.PIXI = PIXI;</script>
    <script src="live2dcubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
