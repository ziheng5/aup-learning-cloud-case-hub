<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 桌面宠物 - Live2D 测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        #canvas-container {
            width: 400px;
            height: 500px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 500px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        button:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }
        .info {
            margin-top: 20px;
            color: white;
            text-align: center;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <canvas id="live2d-canvas"></canvas>
    </div>
    
    <div class="controls">
        <button onclick="setExpression('exp_01')">表情1</button>
        <button onclick="setExpression('exp_02')">表情2</button>
        <button onclick="setExpression('exp_03')">表情3</button>
        <button onclick="setExpression('exp_04')">表情4</button>
        <button onclick="setExpression('exp_05')">表情5</button>
        <button onclick="setExpression('exp_06')">表情6</button>
        <button onclick="setExpression('exp_07')">表情7</button>
        <button onclick="setExpression('exp_08')">表情8</button>
        <button onclick="playMotion('mtn_01')">动作1</button>
        <button onclick="playMotion('mtn_02')">动作2</button>
        <button onclick="playMotion('mtn_03')">动作3</button>
        <button onclick="playMotion('special_01')">特殊动作1</button>
    </div>
    
    <div class="info">
        <p>模型加载中...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/guansss/pixi-live2d-display@master/dist/bundle.js"></script>
    <script>
        const modelPath = '../mao_pro_zh/mao_pro_zh/runtime/mao_pro.model3.json';
        let model = null;
        let app = null;

        async function initLive2D() {
            try {
                const canvas = document.getElementById('live2d-canvas');
                
                app = new PIXI.Application({
                    view: canvas,
                    autoStart: true,
                    transparent: true,
                    width: 400,
                    height: 500
                });

                model = await PIXI.live2d.Live2DModel.from(modelPath);
                
                app.stage.addChild(model);
                
                const scaleX = canvas.width / model.width;
                const scaleY = canvas.height / model.height;
                const scale = Math.min(scaleX, scaleY) * 0.9;
                
                model.scale.set(scale);
                model.x = (canvas.width - model.width * scale) / 2;
                model.y = (canvas.height - model.height * scale) / 2 + 50;

                console.log('模型加载成功!');
                console.log('可用表情:', model.internalModel.expressionManager.expressions.map(e => e.name));
                console.log('可用动作:', Object.keys(model.internalModel.motionManager.definitions));
                
                document.querySelector('.info p').textContent = '? 模型加载成功！点击按钮测试表情和动作';
                
            } catch (error) {
                console.error('加载失败:', error);
                document.querySelector('.info p').textContent = '? 加载失败: ' + error.message;
            }
        }

        function setExpression(name) {
            if (model) {
                model.expression(name);
                console.log('设置表情:', name);
            }
        }

        function playMotion(name) {
            if (model) {
                model.motion(name);
                console.log('播放动作:', name);
            }
        }

        window.onload = initLive2D;
    </script>
</body>
</html>
