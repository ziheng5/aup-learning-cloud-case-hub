<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live2D ????????</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Consolas, monospace; background: #1e1e1e; color: #d4d4d4; display: flex; }
        .model-area { flex: 1; display: flex; align-items: center; justify-content: center; }
        .model-container { width: 400px; height: 600px; background: #252526; border-radius: 4px; }
        canvas { display: block; }
        .control-area { width: 450px; padding: 15px; background: #252526; border-left: 1px solid #333; }
        h3 { color: #569cd6; margin: 10px 0; font-size: 14px; }
        .status { font-size: 12px; color: #9cdcfe; margin-bottom: 10px; }
        .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
        input { flex: 1; padding: 8px; background: #1e1e1e; border: 1px solid #333; color: #d4d4d4; font-size: 13px; }
        button { padding: 8px 16px; background: #0e639c; border: none; color: #fff; cursor: pointer; font-size: 13px; }
        button:hover { background: #1177bb; }
        .btn-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
        .btn-sm { padding: 6px 12px; font-size: 12px; background: #333; }
        .btn-sm:hover { background: #444; }
        .params-box { background: #1e1e1e; padding: 10px; border-radius: 4px; font-size: 12px; max-height: 400px; overflow-y: auto; white-space: pre-wrap; }
        .key { color: #9cdcfe; }
        .string { color: #ce9178; }
        .number { color: #b5cea8; }
        .loading { color: #569cd6; }
        .error { color: #f14c4c; }
    </style>
</head>
<body>
    <div class="model-area">
        <div class="model-container">
            <canvas id="live2dCanvas"></canvas>
        </div>
    </div>
    <div class="control-area">
        <h3>? ?????</h3>
        <div class="status" id="modelStatus">??????...</div>
        <div class="status" id="currentState">???: -</div>

        <h3>? ??????? (???????????)</h3>
        <div class="btn-row">
            <button class="btn-sm" onclick="testEmotion('happy')">????</button>
            <button class="btn-sm" onclick="testEmotion('sad')">????</button>
            <button class="btn-sm" onclick="testEmotion('angry')">????</button>
            <button class="btn-sm" onclick="testEmotion('playful')">???</button>
            <button class="btn-sm" onclick="testEmotion('shy')">????</button>
            <button class="btn-sm" onclick="testEmotion('neutral')">????</button>
        </div>

        <h3>? AI ???????</h3>
        <div class="input-row">
            <input type="text" id="messageInput" placeholder="??????????????????..." onkeypress="handleKey(event)">
            <button onclick="sendToAI()">????</button>
        </div>

        <h3>? AI ???</h3>
        <div class="params-box" id="aiResponse">??????...</div>

        <h3>? ???????????????????</h3>
        <div class="params-box" id="allParams">?????????????...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@pixi/live2d@0.4.0/dist/index.js"></script>
    <script src="live2dcubismcore.min.js"></script>

    <script>
        const SERVER_URL = 'https://rabbit-port-vegetable-colorado.trycloudflare.com';
        const MODEL_PATH = './mao_pro_zh/mao_pro_zh/runtime/mao_pro.model3.json';

        let live2dModel = null;
        let sessionId = null;

        const emotionMap = {
            'happy': { expression: 'exp_01', motion: 'special_01' },
            'sad': { expression: 'exp_02', motion: 'mtn_02' },
            'angry': { expression: 'exp_03', motion: 'mtn_03' },
            'playful': { expression: 'exp_04', motion: 'special_02' },
            'shy': { expression: 'exp_06', motion: 'mtn_01' },
            'neutral': { expression: 'exp_01', motion: 'mtn_01' }
        };

        async function initLive2D() {
            try {
                const canvas = document.getElementById('live2dCanvas');
                canvas.width = 400;
                canvas.height = 600;

                const app = new PIXI.Application({
                    view: canvas,
                    autoStart: true,
                    transparent: true,
                    width: 400,
                    height: 600
                });

                const Live2DModel = PIXI.live2d.Live2DModel;
                await Live2DModel.registerTicker(PIXI.Ticker);
                
                live2dModel = await Live2DModel.from(MODEL_PATH);
                app.stage.addChild(live2dModel);

                const scale = Math.min(400 / live2dModel.width, 600 / live2dModel.height) * 0.9;
                live2dModel.scale.set(scale);
                live2dModel.x = (400 - live2dModel.width * scale) / 2;
                live2dModel.y = 600 - live2dModel.height * scale;

                document.getElementById('modelStatus').textContent = '? ????????';
            } catch (e) {
                document.getElementById('modelStatus').textContent = '? ???????: ' + e.message;
            }
        }

        function testEmotion(emotion) {
            if (!live2dModel) return;
            const config = emotionMap[emotion];
            if (config) {
                live2dModel.expression(config.expression).catch(() => {});
                live2dModel.motion(config.motion).catch(() => {});
                document.getElementById('currentState').textContent = `????: ${emotion} | ????: ${config.expression} | ????: ${config.motion}`;
            }
        }

        async function sendToAI() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;

            document.getElementById('allParams').innerHTML = '<span class="loading">??????...</span>';

            try {
                if (!sessionId) {
                    const res = await axios.post(`${SERVER_URL}/api/v1/session`);
                    sessionId = res.data.session_id;
                }

                const response = await axios.post(`${SERVER_URL}/api/v1/chat`, {
                    session_id: sessionId,
                    message: message,
                    stream: false
                }, { timeout: 60000 });

                const data = response.data;
                
                document.getElementById('aiResponse').textContent = data.text;
                document.getElementById('allParams').innerHTML = formatParams(data);
                document.getElementById('currentState').textContent = `????: ${data.emotion} | ????: ${data.action || 'idle'}`;

                if (live2dModel) {
                    const config = emotionMap[data.emotion] || emotionMap['neutral'];
                    live2dModel.expression(config.expression).catch(() => {});
                    live2dModel.motion(config.motion).catch(() => {});

                    if (data.live2d_params && data.live2d_params.params) {
                        applyParams(data.live2d_params.params);
                    }
                }

            } catch (e) {
                document.getElementById('allParams').innerHTML = `<span class="error">????: ${e.message}</span>`;
            }
        }

        function applyParams(params) {
            if (!live2dModel || !live2dModel.internalModel) return;
            try {
                const core = live2dModel.internalModel.coreModel;
                if (params.eye_open !== undefined) {
                    core.setParameterValueById('ParamEyeLOpen', params.eye_open);
                    core.setParameterValueById('ParamEyeROpen', params.eye_open);
                }
                if (params.mouth_open !== undefined) {
                    core.setParameterValueById('ParamMouthOpenY', params.mouth_open);
                }
                if (params.eye_x !== undefined) {
                    core.setParameterValueById('ParamEyeBallX', params.eye_x);
                }
                if (params.eye_y !== undefined) {
                    core.setParameterValueById('ParamEyeBallY', params.eye_y);
                }
                if (params.body_angle_y !== undefined) {
                    core.setParameterValueById('ParamBodyAngleY', params.body_angle_y);
                }
            } catch (e) { console.log('??????????', e); }
        }

        function formatParams(data) {
            return `session_id: ${data.session_id}

emotion: ${data.emotion}
action: ${data.action || 'idle'}

emotion_vector:
  valence: ${data.emotion_vector.valence}
  arousal: ${data.emotion_vector.arousal}
  dominance: ${data.emotion_vector.dominance}
  intensity: ${data.emotion_vector.intensity}

live2d_params:
  emotion: ${data.live2d_params.emotion}
  motion: ${data.live2d_params.motion}
  params:
    eye_open: ${data.live2d_params.params.eye_open}
    mouth_open: ${data.live2d_params.params.mouth_open}
    eye_x: ${data.live2d_params.params.eye_x}
    eye_y: ${data.live2d_params.params.eye_y}
    body_angle_x: ${data.live2d_params.params.body_angle_x}
    body_angle_y: ${data.live2d_params.params.body_angle_y}
    body_angle_z: ${data.live2d_params.params.body_angle_z}
    breath: ${data.live2d_params.params.breath}`;
        }

        function handleKey(e) {
            if (e.key === 'Enter') sendToAI();
        }

        window.addEventListener('DOMContentLoaded', initLive2D);
    </script>
</body>
</html>
