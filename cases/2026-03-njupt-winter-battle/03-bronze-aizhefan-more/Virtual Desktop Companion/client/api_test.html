<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务器API测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Consolas, monospace; background: #1e1e1e; color: #d4d4d4; display: flex; flex-direction: column; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; display: flex; gap: 20px; }
        .left-panel { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .right-panel { width: 600px; background: #252526; border-radius: 4px; padding: 15px; }
        h2 { color: #569cd6; margin-bottom: 10px; font-size: 16px; }
        h3 { color: #569cd6; margin: 10px 0; font-size: 14px; }
        .status { font-size: 12px; color: #9cdcfe; margin-bottom: 10px; }
        .input-row { display: flex; gap: 8px; margin-bottom: 10px; }
        input { flex: 1; padding: 8px; background: #1e1e1e; border: 1px solid #333; color: #d4d4d4; font-size: 13px; }
        button { padding: 8px 16px; background: #0e639c; border: none; color: #fff; cursor: pointer; font-size: 13px; }
        button:hover { background: #1177bb; }
        .btn-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
        .btn-sm { padding: 6px 12px; font-size: 12px; background: #333; }
        .btn-sm:hover { background: #444; }
        .response-box { background: #1e1e1e; padding: 10px; border-radius: 4px; font-size: 12px; max-height: 600px; overflow-y: auto; white-space: pre-wrap; }
        .key { color: #9cdcfe; }
        .string { color: #ce9178; }
        .number { color: #b5cea8; }
        .loading { color: #569cd6; }
        .error { color: #f14c4c; }
        .success { color: #4ec9b0; }
        select { padding: 8px; background: #1e1e1e; border: 1px solid #333; color: #d4d4d4; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <h2>服务器API测试</h2>
            
            <h3>连接设置</h3>
            <div class="input-row">
                <input type="text" id="serverUrl" placeholder="服务器URL" value="https://mortgage-quarters-wolf-beginning.trycloudflare.com">
            </div>
            
            <h3>会话管理</h3>
            <div class="btn-row">
                <button class="btn-sm" onclick="createSession()">创建会话</button>
                <button class="btn-sm" onclick="clearSession()">清除会话</button>
            </div>
            <div class="status" id="sessionStatus">未创建会话</div>
            
            <h3>模式选择</h3>
            <div class="input-row">
                <select id="modeSelect">
                    <option value="chat">聊天模式</option>
                    <option value="wsl2">WSL2模式</option>
                </select>
            </div>
            
            <h3>发送消息</h3>
            <div class="input-row">
                <input type="text" id="messageInput" placeholder="输入测试消息..." onkeypress="handleKey(event)">
                <button onclick="sendMessage()">发送</button>
            </div>
            
            <h3>快速测试</h3>
            <div class="btn-row">
                <button class="btn-sm" onclick="testBasic()">基础测试</button>
                <button class="btn-sm" onclick="testChat()">聊天测试</button>
                <button class="btn-sm" onclick="testWSL2()">WSL2测试</button>
                <button class="btn-sm" onclick="testHealth()">健康检查</button>
            </div>
        </div>
        
        <div class="right-panel">
            <h3>API响应</h3>
            <div class="response-box" id="responseBox">等待请求...</div>
            
            <h3>会话信息</h3>
            <div class="response-box" id="sessionBox">无</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
        let sessionId = null;
        
        function getServerUrl() {
            return document.getElementById('serverUrl').value.trim();
        }
        
        function getMode() {
            return document.getElementById('modeSelect').value;
        }
        
        async function createSession() {
            try {
                const response = await axios.post(`${getServerUrl()}/api/v1/session`);
                sessionId = response.data.session_id;
                document.getElementById('sessionStatus').textContent = `会话ID: ${sessionId}`;
                document.getElementById('sessionBox').textContent = JSON.stringify(response.data, null, 2);
                logResponse('创建会话', response.data);
            } catch (e) {
                logError('创建会话失败', e);
            }
        }
        
        function clearSession() {
            sessionId = null;
            document.getElementById('sessionStatus').textContent = '未创建会话';
            document.getElementById('sessionBox').textContent = '无';
            logResponse('清除会话', { message: '会话已清除' });
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            
            if (!sessionId) {
                await createSession();
            }
            
            try {
                const response = await axios.post(`${getServerUrl()}/api/v1/chat`, {
                    session_id: sessionId,
                    message: message,
                    mode: getMode(),
                    stream: false
                }, { timeout: 60000 });
                
                logResponse('发送消息', response.data);
                input.value = '';
            } catch (e) {
                logError('发送消息失败', e);
            }
        }
        
        async function testBasic() {
            try {
                const response = await axios.get(`${getServerUrl()}/api/v1/health`);
                logResponse('健康检查', response.data);
            } catch (e) {
                logError('健康检查失败', e);
            }
        }
        
        async function testChat() {
            document.getElementById('modeSelect').value = 'chat';
            await createSession();
            await sendMessageWith('你好，介绍一下你自己');
        }
        
        async function testWSL2() {
            document.getElementById('modeSelect').value = 'wsl2';
            await createSession();
            await sendMessageWith('查看当前目录');
        }
        
        async function testHealth() {
            await testBasic();
        }
        
        async function sendMessageWith(message) {
            document.getElementById('messageInput').value = message;
            await sendMessage();
        }
        
        function logResponse(title, data) {
            const responseBox = document.getElementById('responseBox');
            const timestamp = new Date().toLocaleTimeString();
            responseBox.innerHTML = `<span class="success">[${timestamp}] ${title}</span>\n\n${formatData(data)}`;
        }
        
        function logError(title, error) {
            const responseBox = document.getElementById('responseBox');
            const timestamp = new Date().toLocaleTimeString();
            const errorMsg = error.response ? error.response.data : error.message;
            responseBox.innerHTML = `<span class="error">[${timestamp}] ${title} 失败</span>\n\n${errorMsg}`;
        }
        
        function formatData(data) {
            if (typeof data === 'string') {
                return data;
            }
            return JSON.stringify(data, null, 2);
        }
        
        function handleKey(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        window.onload = function() {
            logResponse('初始化', { message: 'API测试页面已加载' });
        };
    </script>
</body>
</html>
